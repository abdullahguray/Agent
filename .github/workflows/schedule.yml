name: Scrape Schedule
on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape cycle
        run: |
          curl -X POST https://fastidious-otter-8293ac.netlify.app/api/schedule \
            -H "Authorization: Bearer scrape-agent-cron-2026" \
            -H "Content-Type: application/json" \
            -d '{}'
